<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Demon | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');
        
        body {
            background: #1a1a1a;
            color: #e0d8ce;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            cursor: url('https://cdn.cursors-4u.com/user/10/10-2165.cur'), auto;
        }

        header {
            position: fixed; top: 0; width: 100%; padding: 20px;
            background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; gap: 20px; z-index: 1000;
        }

        section { padding: 100px 20px; text-align: center; }

        .glass-card {
            background: rgba(224, 216, 206, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            max-width: 800px; margin: auto;
        }

        .skill-bar {
            background: #333; height: 10px; border-radius: 5px;
            margin: 10px 0; overflow: hidden;
        }
        .skill-fill { height: 100%; background: linear-gradient(90deg, #b8a99a, #d1c7b7); width: 0; transition: 2s; }

        h2 { border-bottom: 2px solid #b8a99a; display: inline-block; padding-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <a href="#home" style="color:white; text-decoration:none;">الرئيسية</a>
    <a href="#skills" style="color:white; text-decoration:none;">الخبرات</a>
    <a href="#projects" style="color:white; text-decoration:none;">المشاريع</a>
</header>

<section id="home">
    <div class="glass-card">
        <h1>Demon</h1>
        <p>Full Stack Developer & Minecraft Expert</p>
    </div>
</section>

<section id="skills">
    <h2>خبراتي</h2>
    <div class="glass-card" style="text-align: right;">
        <p>Node.js</p>
        <div class="skill-bar"><div class="skill-fill" style="width: 90%;"></div></div>
        <p>Discord.js</p>
        <div class="skill-bar"><div class="skill-fill" style="width: 95%;"></div></div>
        <p>Minecraft Configuration</p>
        <div class="skill-bar"><div class="skill-fill" style="width: 100%;"></div></div>
    </div>
</section>

<section id="projects">
    <h2>المشاريع الحالية</h2>
    <div class="glass-card">
        <p>جاري العمل على مشاريع برمجية خاصة...</p>
    </div>
</section>

<script>
    // تفعيل تأثيرات الحركة عند التحميل
    window.onload = () => document.querySelectorAll('.skill-fill').forEach(el => el.style.width = el.style.width);
</script>
</body>
</html>
