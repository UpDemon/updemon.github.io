<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');

        body {
            background-color: #d1c7b7; /* لون بيج هادئ مستوحى من البروفايل */
            color: #2c2f33;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            cursor: url('https://cdn.cursors-4u.com/user/10/10-2165.cur'), auto;
        }

        .container {
            background-color: #e0d8ce;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 700px;
            width: 90%;
            text-align: center;
            border: 2px solid #b8a99a;
        }

        h1 { font-size: 2.5em; margin-bottom: 10px; color: #1e1e1e; }
        p { font-size: 1.1em; color: #444; }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .skill {
            background: #c5bbb0;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.3s ease, background 0.3s ease;
            cursor: pointer;
            border: 1px solid #b8a99a;
        }

        .skill:hover {
            transform: translateY(-5px);
            background: #b5a99d;
        }

        .contact-box {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #b8a99a;
        }

        .contact-link {
            display: block;
            margin: 10px 0;
            text-decoration: none;
            color: #2c2f33;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Demon</h1>
    <p>Full Stack Developer | Discord Bot Developer</p>

    <div class="skills-grid">
        <div class="skill">Minecraft Configurator</div>
        <div class="skill">Server Setup Expert</div>
        <div class="skill">Full Stack Developer</div>
        <div class="skill">Node.js</div>
        <div class="skill">Discord.js</div>
        <div class="skill">HTML / CSS</div>
    </div>

    <div class="contact-box">
        <h3>تواصل معي</h3>
        <a class="contact-link" href="#">Instagram: 0__0z0</a>
        <a class="contact-link" href="#">Discord: 2yfu</a>
    </div>
</div>

</body>
</html>
